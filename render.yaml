services:
  - type: web
    name: sibrah-tech
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn sibrah_project.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: sibrah_project.settings_production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: sibrah-db
          property: connectionString

databases:
  - name: sibrah-db
    databaseName: sibrah
    user: sibrah
