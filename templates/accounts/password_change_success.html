{% extends "base.html" %}
{% block title %}Password Changed — SIBRAH{% endblock %}

{% block content %}
<section style="background:var(--light);padding:100px 2rem;text-align:center;">
  <div style="max-width:460px;margin:0 auto;" class="sibrah-card">
    <div style="font-size:4rem;margin-bottom:16px;">🔐</div>
    <h1 style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:10px;">
      Password Changed!
    </h1>
    <p style="color:var(--muted);line-height:1.7;margin-bottom:24px;">
      Your password has been updated successfully.
      Use your new password the next time you log in.
    </p>
    <a href="{% url 'accounts:dashboard' %}" class="btn-sibrah" style="justify-content:center;">
      <i class="fas fa-home"></i> Go to Dashboard
    </a>
  </div>
</section>
{% endblock %}
