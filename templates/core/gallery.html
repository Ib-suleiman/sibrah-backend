{% extends "base.html" %}
{% block title %}Gallery — SIBRAH{% endblock %}
{% block content %}
<div class="page-hero">
  <div class="section-tag">Gallery</div>
  <h1>Our Gallery</h1>
  <p>A glimpse into our workspace, training sessions, and project deliveries.</p>
</div>
<section style="background:#fff;padding:70px 2rem;">
  <div class="container-fluid">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
      {% for g in gallery_items %}<div style="border-radius:12px;overflow:hidden;aspect-ratio:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:var(--gradient);position:relative;transition:all 0.3s;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'"><span>{{ g.icon }}</span><div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.5);color:#fff;font-size:0.78rem;font-weight:600;padding:8px 12px;opacity:0;transition:opacity 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0'">{{ g.label }}</div></div>{% endfor %}
    </div>
  </div>
</section>
{% endblock %}
